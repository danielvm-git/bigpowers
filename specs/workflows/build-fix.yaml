name: build-fix
command: /build-fix
description: Full bug-fix cycle — investigate, diagnose root cause, apply fix via TDD, validate.
skills:
  - investigate-bug
  - diagnose-root
  - develop-tdd
  - validate-fix
verify: "ls investigate-bug/SKILL.md diagnose-root/SKILL.md develop-tdd/SKILL.md validate-fix/SKILL.md >/dev/null 2>&1 && echo 'OK' || echo 'FAIL'"
