id: e13
title: "Catalog Integrity & Index Automation"
wsjf: 7.7
bcps: 3
covers:
  - "Fix skills-lock.json drift: 62 skill dirs exist but only 38 are in the lockfile — 24 missing entries"
  - "Autogenerate SKILL-INDEX.md from skills-lock.json + SKILL.md frontmatter during npm run sync"
  - "Add lockfile regeneration to sync-skills.sh so releases never ship a stale catalog"
  - "Verify build-epic and fix-bug are properly indexed and discoverable (feedback claimed they were missing from main — they exist but must be verified in lockfile + index)"
  - "Complete or deprecate stale 'Planned' skills that haven't moved in >30 days"
rationale: "BV=8 (broken lockfile = broken release pipeline), TC=10 (blocks every sync-skills.sh run), RR=5 (prevents catalog drift regressions), JS=3 (2-3 days — mostly script + data work)"
stories:
  - id: e13s01
    title: "Regenerate skills-lock.json with all 62 skills"
    bcps: 1
    tasks:
      - desc: |
          Regenerate `skills-lock.json` to include all 62 skills that have `SKILL.md` files.

          Current state: 38 entries in lockfile, 62 skill dirs with SKILL.md. Missing 24:
          align-grid, assess-impact, build-epic, change-request, compose-workflow, evolve-skill,
          fix-bug, map-codebase, migrate-spec, orchestrate-project, plan-release, research-first,
          reset-baseline, run-evals, run-planning, search-skills, session-state, setup-environment,
          simulate-agents, stocktake-skills, and 4 more.

          **Required implementation:**
          1. Script `scripts/regenerate-lockfile.sh` (or python in sync-skills.sh):
             - Scan all `<dir>/SKILL.md` files
             - Parse YAML frontmatter (name, description)
             - Compute SHA-256 hash of full SKILL.md content
             - Write `skills-lock.json` with `{ skills: { <name>: { description, sha256, path } } }`
          2. Run it — verify lockfile now has exactly 62 entries
          3. Add lockfile regeneration as a step in `scripts/sync-skills.sh`

          **Gherkin Acceptance Criteria:**
          ```
          Given 62 skill directories each containing SKILL.md
          When scripts/regenerate-lockfile.sh runs
          Then skills-lock.json contains exactly 62 entries
          And every entry has name, description, sha256, and path fields
          And sha256 matches the actual SKILL.md content
          And the script exits 0
          ```

          **Acceptance Criteria:**
          - `skills-lock.json` has 62 entries (not 38)
          - Every SHA-256 hash matches its source SKILL.md
          - No entries point to nonexistent paths
          - `scripts/sync-skills.sh` regenerates lockfile as part of sync
        verify: |
          python3 -c "
          import json, os, hashlib
          d = json.load(open('skills-lock.json'))
          skills = d.get('skills', d)
          print(f'Skills in lock: {len(skills)}')
          assert len(skills) == 62, f'Expected 62, got {len(skills)}'
          for name, info in skills.items():
              path = info.get('path', f'{name}/SKILL.md')
              assert os.path.exists(path), f'{path} not found'
              content = open(path).read()
              expected = hashlib.sha256(content.encode()).hexdigest()
              if 'sha256' in info:
                  assert info['sha256'] == expected[:16], f'SHA mismatch for {name}'
          print('OK: 62 skills, all paths exist, hashes match')
          "

  - id: e13s02
    title: "Autogenerate SKILL-INDEX.md from lockfile + frontmatter"
    bcps: 1
    tasks:
      - desc: |
          Replace the manually-maintained `SKILL-INDEX.md` with an auto-generated version
          built from `skills-lock.json` + each skill's YAML frontmatter.

          The auto-generated index must:
          1. Read `skills-lock.json` for the canonical skill list
          2. For each skill, extract frontmatter fields: name, description, status (if present)
          3. Generate a markdown table with: Skill Name | Description | Status | File
          4. Include: total count, generation timestamp, source-of-truth note
          5. Add a "DO NOT EDIT" header — this file is generated by sync-skills.sh
          6. Categorize skills by lifecycle phase (Discover, Plan, Build, Verify, Release, Sustain)

          **Index categorization (by phase):**
          - Discover: survey-context, research-first, search-skills, using-bigpowers, map-codebase
          - Plan: elaborate-spec, scope-work, slice-tasks, plan-work, plan-release, run-planning, plan-refactor, define-language, define-success, model-domain, seed-conventions
          - Build: develop-tdd, kickoff-branch, execute-plan, build-epic, spike-prototype, craft-skill, deepen-architecture, design-interface, setup-environment, wire-observability, align-grid
          - Verify: verify-work, validate-fix, audit-code, enforce-first, inspect-quality, investigate-bug, diagnose-root, fix-bug, request-review, respond-review, run-evals
          - Release: release-branch, commit-message, guard-git, hook-commits, change-request, assess-impact
          - Sustain: session-state, edit-document, write-document, organize-workspace, reset-baseline, stocktake-skills, evolve-skill, terse-mode, delegate-task, dispatch-agents, simulate-agents, compose-workflow, grill-me, grill-with-docs, migrate-spec, orchestrate-project

          **Acceptance Criteria:**
          - `bash scripts/sync-skills.sh` regenerates `SKILL-INDEX.md`
          - Index shows correct count (62)
          - Index has a "generated: <ISO timestamp>" line that updates each run
          - No stale "📋 Planned" entries for skills that have SKILL.md files
          - Commit of generated index matches what CI would produce
        verify: |
          bash scripts/sync-skills.sh 2>&1 | grep -q "SKILL-INDEX.md" && echo "OK: index regenerated" || echo "FAIL: not in sync"
          grep -c "| \[" SKILL-INDEX.md | awk '{if($1>=60) print "OK: " $1 " skills indexed"; else print "FAIL: only " $1 " indexed"}'
          grep "generated:" SKILL-INDEX.md && echo "OK: has timestamp" || echo "FAIL: no timestamp"

  - id: e13s03
    title: "Complete or deprecate stale planned skills"
    bcps: 1
    tasks:
      - desc: |
          Audit all skills for "planned but not implemented" status and resolve each.

          Current situation from feedback:
          - scope-work: exists as SKILL.md but marked "📋 Planned" in old index — verify it's complete
          - slice-tasks: same — verify complete
          - run-planning: same — verify complete
          - search-skills: same — verify complete
          - These 4 skills exist in `skills-lock.json` but their SKILL.md files need a completeness check

          **For each skill with a SKILL.md that existed as "planned" in old index:**
          1. Read the SKILL.md and verify it has substantive content (not a stub)
          2. Verify it has a `name` and `description` in frontmatter
          3. Verify it has at least one procedural step or instruction block
          4. If complete → no action needed (the old index was stale)
          5. If still a stub → either complete it or add `status: deprecated` to frontmatter

          **Gherkin:**
          ```
          Given scope-work, slice-tasks, run-planning, and search-skills exist as SKILL.md files
          And the old SKILL-INDEX marked them "📋 Planned"
          When the catalog audit runs
          Then each file is confirmed to have substantive, non-stub content
          And any that are still stubs get status: deprecated in frontmatter
          And the auto-generated index shows their actual status
          ```

          **Acceptance Criteria:**
          - All 4 formerly-"planned" skills verified to have substantive SKILL.md content
          - No skill in the catalog is a stub without explicit `status: deprecated`
          - verify: each has ≥ 50 lines of content OR an explicit deprecation reason
        verify: |
          for skill in scope-work slice-tasks run-planning search-skills; do
            lines=$(wc -l < "$skill/SKILL.md")
            if [ "$lines" -ge 50 ]; then
              echo "OK: $skill has $lines lines"
            else
              deprecated=$(grep -c "status: deprecated" "$skill/SKILL.md" 2>/dev/null || echo 0)
              if [ "$deprecated" -gt 0 ]; then
                echo "DEPRECATED: $skill ($lines lines)"
              else
                echo "STUB: $skill only $lines lines — needs completion or deprecation"
              fi
            fi
          done
