  - id: e09s06
    title: "Add HARD GATE enforcement callouts to 35 skills"
    context: "Stocktake audit identified 35 skills missing HARD GATE blockquote callouts (format: `> **HARD GATE** — constraint`). These are critical decision gates that must be enforced during skill execution. Plan: specs/plans/PLAN-add-hard-gates.md"
    tasks:
      - desc: "[BCP 1] Create HARD GATES reference document for each phase (Discovery, Elaborate, Plan, Build, Sustain, Utility)"
        verify: "test -f specs/plans/HARD-GATES-REFERENCE.md && grep -c '^##' specs/plans/HARD-GATES-REFERENCE.md | grep -q '[1-9]'"
      - desc: "[BCP 2] Add HARD GATE callouts to Batch 1 (survey-context, map-codebase, research-first, elaborate-spec)"
        verify: "for skill in survey-context map-codebase research-first elaborate-spec; do grep -q '> \\*\\*HARD GATE\\*\\*' $skill/SKILL.md || echo MISSING; done | wc -l | grep -q '^0$'"
      - desc: "[BCP 3] Add HARD GATE callouts to Batch 2 (define-language, deepen-architecture, design-interface, grill-me, model-domain)"
        verify: "for skill in define-language deepen-architecture design-interface grill-me model-domain; do grep -q '> \\*\\*HARD GATE\\*\\*' $skill/SKILL.md || echo MISSING; done | wc -l | grep -q '^0$'"
      - desc: "[BCP 4] Add HARD GATE callouts to Batch 3 (assess-impact, plan-refactor, scope-work, change-request)"
        verify: "for skill in assess-impact plan-refactor scope-work change-request; do grep -q '> \\*\\*HARD GATE\\*\\*' $skill/SKILL.md || echo MISSING; done | wc -l | grep -q '^0$'"
      - desc: "[BCP 5] Add HARD GATE callouts to Batch 4 (guard-git, hook-commits, seed-conventions)"
        verify: "for skill in guard-git hook-commits seed-conventions; do grep -q '> \\*\\*HARD GATE\\*\\*' $skill/SKILL.md || echo MISSING; done | wc -l | grep -q '^0$'"
      - desc: "[BCP 6] Add HARD GATE callouts to Batch 5 (delegate-task, dispatch-agents, enforce-first, run-planning)"
        verify: "for skill in delegate-task dispatch-agents enforce-first run-planning; do grep -q '> \\*\\*HARD GATE\\*\\*' $skill/SKILL.md || echo MISSING; done | wc -l | grep -q '^0$'"
      - desc: "[BCP 7] Add HARD GATE callouts to Batch 6 (inspect-quality, organize-workspace, stocktake-skills, evolve-skill)"
        verify: "for skill in inspect-quality organize-workspace stocktake-skills evolve-skill; do grep -q '> \\*\\*HARD GATE\\*\\*' $skill/SKILL.md || echo MISSING; done | wc -l | grep -q '^0$'"
      - desc: "[BCP 8] Add HARD GATE callouts to Batch 7 (terse-mode, compose-workflow, edit-document, session-state, search-skills, setup-environment, simulate-agents, validate-fix, visual-dashboard, wire-observability)"
        verify: "for skill in terse-mode compose-workflow edit-document session-state search-skills setup-environment simulate-agents validate-fix visual-dashboard wire-observability; do grep -q '> \\*\\*HARD GATE\\*\\*' $skill/SKILL.md || echo MISSING; done | wc -l | grep -q '^0$'"
      - desc: "[BCP 9] Add HARD GATE callouts to Batch 8 (using-bigpowers, orchestrate-project, spike-prototype, commit-message, audit-code, respond-review)"
        verify: "for skill in using-bigpowers orchestrate-project spike-prototype commit-message audit-code respond-review; do grep -q '> \\*\\*HARD GATE\\*\\*' $skill/SKILL.md || echo MISSING; done | wc -l | grep -q '^0$'"
      - desc: "[BCP 10] Run sync-skills.sh to regenerate .cursor/rules and .gemini/ artifacts"
        verify: "bash scripts/sync-skills.sh && test -f .cursor/rules/bigpowers.md"
      - desc: "[BCP 11] Run stocktake-skills again to verify 100% HARD GATE compliance"
        verify: "grep -c '> \\*\\*HARD GATE\\*\\*' */SKILL.md | awk -F: '{s+=$2} END {print s}' | grep -q '[3-9][0-9]'"
    bcps: 11
