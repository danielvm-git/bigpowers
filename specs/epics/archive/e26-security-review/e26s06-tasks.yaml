id: e26s06
title: "release-branch hard gate"
bcps: 2
status: todo
tasks:
  - id: 1
    description: "Add security gate step to release-branch"
    what: |
      Edit release-branch/SKILL.md to add a security gate step positioned
      after coverage verification and before PR creation. The gate checks
      specs/security/REVIEW.md freshness, blocks on unresolved HIGH findings,
      allows with warning when EXCEPTIONS.md documents deviations.
    security: medium
    verify: |
      grep -c "security gate\|SECURITY GATE" .pi/skills/release-branch/SKILL.md | awk '{if($1>=1) print "OK"; else print "FAIL"}'
  - id: 2
    description: "Document EXCEPTIONS.md mechanism for intentional deviations"
    what: |
      In release-branch/SKILL.md, document the EXCEPTIONS.md format: each
      exception requires finding ID, sign-off rationale, date, and reviewer.
      Add verify command for the gate.
    security: medium
    verify: |
      grep -c "EXCEPTIONS" .pi/skills/release-branch/SKILL.md | awk '{if($1>=1) print "OK"; else print "FAIL"}'
