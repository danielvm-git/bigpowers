    verify: |
      grep -c "SECURITY BLOCK\|EXCEPTIONS" .pi/skills/verify-work/SKILL.md | awk '{if($1>=2) print "OK"; else print "FAIL"}'
  - id: 3
    description: "Wire Phase 5 findings into gap-closure loop"
    what: |
      In verify-work/SKILL.md, update the gap-closure loop (Phase 7) to
