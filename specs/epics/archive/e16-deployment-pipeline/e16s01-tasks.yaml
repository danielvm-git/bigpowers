story_id: e16s01
title: "craft-skill: deploy"
status: backlog
bcps: 3
tasks:
  - id: 1
    description: "Create deploy/SKILL.md with verb-noun naming and frontmatter"
    verify: "test -f deploy/SKILL.md && grep -q 'name: deploy' deploy/SKILL.md && echo OK"
    status: backlog
  - id: 2
    description: "Document pipeline stages: build → verify artifact → deploy → wait → smoke"
    verify: "grep -qi 'build\|artifact\|deploy\|smoke' deploy/SKILL.md && echo OK"
    status: backlog
  - id: 3
    description: "Add build command detection from manifest files (package.json, Cargo.toml, Makefile)"
    verify: "grep -ci 'package.json\|Cargo.toml\|Makefile\|manifest' deploy/SKILL.md | awk '{if(\$1>=1) print \"OK\"; else print \"FAIL\"}'"
    status: backlog
  - id: 4
    description: "Add platform deploy tool invocation (MCP or CLI) with status polling and timeout"
    verify: "grep -ci 'timeout\|poll\|status\|retry\|backoff' deploy/SKILL.md | awk '{if(\$1>=2) print \"OK\"; else print \"FAIL\"}'"
    status: backlog
  - id: 5
    description: "Add smoke-test step: curl -sSf \$DEPLOY_URL"
    verify: "grep -q 'curl.*DEPLOY_URL\|smoke\|health' deploy/SKILL.md && echo OK"
    status: backlog
  - id: 6
    description: "Add deploy to SKILL-INDEX.md via sync-skills.sh"
    verify: "grep -q 'deploy' SKILL-INDEX.md && echo OK"
    status: backlog
