    command: |
      python3 -c "
      import json, os, hashlib
      d = json.load(open('skills-lock.json'))
      s = d.get('skills', d)
      assert len(s) == 62
      for n, i in s.items():
          p = i.get('path', f'{n}/SKILL.md')
          c = open(p).read()
          h = hashlib.sha256(c.encode()).hexdigest()[:16]
          assert i['sha256'] == h
      print('OK')
      "
