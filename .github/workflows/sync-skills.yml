name: Sync Skills on Push

on:
  push:
    branches: [ main, develop ]
    paths:
      - '*/SKILL.md'
      - 'scripts/sync-skills.sh'
      - 'scripts/build-skill-index.sh'
      - '.github/workflows/sync-skills.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Sync skills
        run: bash scripts/sync-skills.sh

      - name: Verify generated artifacts are committed
        run: |
          git diff --exit-code \
            .cursor/rules \
            .gemini/extensions/bigpowers/skills \
            .gemini/extensions/bigpowers/commands || {
            echo "::error::Skill artifacts out of date. Run: bash scripts/sync-skills.sh && git add -A && git commit"
            git diff --stat .cursor/rules .gemini/extensions/bigpowers/skills .gemini/extensions/bigpowers/commands
            exit 1
          }
          bash scripts/build-skill-index.sh
          git diff --exit-code specs/SKILL-SEARCH-INDEX.md || {
            echo "::error::SKILL-SEARCH-INDEX.md out of date. Run: bash scripts/sync-skills.sh && git commit"
            exit 1
          }
