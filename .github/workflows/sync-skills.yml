name: Sync Skills on Push

on:
  push:
    branches: [ main, develop ]
    paths:
      - '*/SKILL.md'
      - 'scripts/sync-skills.sh'
      - 'scripts/build-skill-index.sh'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Sync skills
        run: bash scripts/sync-skills.sh

      - name: Verify generated artifacts are committed
        run: |
          git diff --exit-code \
            .cursor/rules \
            .gemini/extensions/bigpowers/ \
            specs/SKILL-SEARCH-INDEX.md \
            opencode.json || {
            echo "::error::Generated artifacts are out of date. Run: bash scripts/sync-skills.sh && git add -A && git commit"
            git diff --stat .cursor/rules .gemini/extensions/bigpowers/ specs/SKILL-SEARCH-INDEX.md opencode.json
            exit 1
          }
